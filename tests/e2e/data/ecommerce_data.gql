-- E-Commerce E2E Test Data
-- Generated: 2026-04-28T12:18:48.903792

-- Create test space
CREATE SPACE IF NOT EXISTS e2e_ecommerce (vid_type=STRING)
USE e2e_ecommerce

-- Create tags
CREATE TAG IF NOT EXISTS user(
    user_id: STRING NOT NULL,
    username: STRING,
    email: STRING,
    register_date: DATE,
    level: INT DEFAULT 1
)

CREATE TAG IF NOT EXISTS product(
    product_id: STRING NOT NULL,
    name: STRING,
    category: STRING,
    price: DOUBLE,
    stock: INT DEFAULT 0
)

CREATE TAG IF NOT EXISTS order(
    order_id: STRING NOT NULL,
    total_amount: DOUBLE,
    status: STRING,
    create_time: TIMESTAMP,
    pay_time: TIMESTAMP
)

-- Create edge types
CREATE EDGE IF NOT EXISTS placed(
    order_time: TIMESTAMP,
    ip_address: STRING
)

CREATE EDGE IF NOT EXISTS contains(
    quantity: INT,
    unit_price: DOUBLE,
    discount: DOUBLE DEFAULT 0.0
)

CREATE EDGE IF NOT EXISTS views(
    view_time: TIMESTAMP,
    duration_seconds: INT
)

