-- Social Network E2E Test Data
-- Generated: 2026-04-28T12:18:48.902299

-- Create test space
CREATE SPACE IF NOT EXISTS e2e_social_network (vid_type=STRING)
USE e2e_social_network

-- Create tags
CREATE TAG IF NOT EXISTS person(
    name: STRING NOT NULL,
    age: INT,
    email: STRING,
    city: STRING,
    created_at: TIMESTAMP
)

CREATE TAG IF NOT EXISTS company(
    name: STRING NOT NULL,
    industry: STRING,
    founded_year: INT,
    headquarters: STRING
)

-- Create edge types
CREATE EDGE IF NOT EXISTS friend(
    degree: FLOAT DEFAULT 0.5,
    since: DATE,
    trust_level: INT
)

CREATE EDGE IF NOT EXISTS works_at(
    position: STRING,
    since: DATE,
    salary_range: STRING
)

-- Create city tag before lives_in edge (edge requires FROM person TO city)
CREATE TAG IF NOT EXISTS city(
    name: STRING NOT NULL
)

CREATE EDGE IF NOT EXISTS lives_in(
    since: DATE,
    address: STRING
) FROM person TO city

