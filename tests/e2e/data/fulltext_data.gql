-- Create test space
CREATE SPACE IF NOT EXISTS e2e_fulltext (vid_type=STRING)
USE e2e_fulltext

-- Create tags
CREATE TAG IF NOT EXISTS article(
    doc_id: STRING NOT NULL,
    title: STRING,
    content: STRING,
    author: STRING,
    publish_date: TIMESTAMP,
    tags: LIST<STRING>
)

CREATE TAG IF NOT EXISTS product_desc(
    sku: STRING NOT NULL,
    name: STRING,
    description: STRING,
    category: STRING
)

-- Create fulltext indexes
CREATE FULLTEXT INDEX IF NOT EXISTS idx_article_content ON article(content) WITH (engine=bm25, analyzer=standard)
CREATE FULLTEXT INDEX IF NOT EXISTS idx_article_title ON article(title) WITH (engine=bm25, analyzer=standard)

